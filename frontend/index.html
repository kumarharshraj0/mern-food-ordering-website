<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="FoodHub - Order delicious food from your favorite local restaurants. Fast delivery, fresh ingredients, and wide variety of cuisines." />
  <meta name="theme-color" content="#ea580c" />

  <title>FoodHub | Delicious Food Delivered to Your Doorstep</title>

  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-title" content="FoodHub" />

  <!-- Preload LCP Image -->

<body class="font-inter">
  <div id="root"></div>
